# Blueprint de deploy do Tarefo no Render.
# Conecte este repositório no Render (New > Blueprint) para deploy automático
# a cada push na branch de produção.
services:
  - type: web
    name: tarefo
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: TZ
        value: America/Sao_Paulo
      - key: DATABASE_URL
        fromDatabase:
          name: tarefo-db
          property: connectionString
      # Segredo de assinatura da sessão (gerado automaticamente pelo Render).
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: tarefo-db
    plan: free
    region: oregon
    # O schema e os dados de exemplo são criados automaticamente na primeira
    # requisição (ver lib/db.ts -> ready()).
